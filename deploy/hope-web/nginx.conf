# hope-web — 프론트 정적 파일 + hope-backend 리버스 프록시
#
# 라우팅:
#   /assets/*              → 정적 (immutable 캐시)
#   /api/*, /health, /docs → hope-backend:4000 프록시
#   나머지                  → index.html (React Router SPA fallback)

server {
    listen 80 default_server;
    server_name _;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 컨테이너 자체 health (nginx 프로세스 살아있음 확인용)
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # 백엔드 프록시 — /api, /health, /docs, /openapi.json
    location ~ ^/(api|health|docs|openapi\.json) {
        proxy_pass http://hope-backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # 음성 업로드 (SPEECH_MAX_BODY_BYTES=10MB) 여유 있게
        client_max_body_size 15m;
    }

    # 정적 자산: Vite 가 해시 파일명 붙여 immutable
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — React Router 는 클라이언트 사이드 라우팅이라
    # /home, /learning 등도 index.html 로.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        # index.html 자체는 캐시 X (배포 시 즉시 갱신)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
